<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - Controle de Ponto</title>
  <link rel="stylesheet" href="ponto_eletronico/style.css">
</head>
<body>
  <div class="container">
    <h1>Controle de Ponto</h1>
    <h2>Login</h2>

    <form action="registro.html">
      <label>E-mail</label>
      <input type="email" placeholder="Digite seu e-mail" required>

      <label>Senha</label>
      <input type="password" placeholder="Digite sua senha" required>

      <button type="submit">Entrar</button>
    </form>

    <p>
      Não tem cadastro?
      <a href="registro.html">Cadastre-se</a>
    </p>
  </div>
</body>
</html>
