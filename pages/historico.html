<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Histórico de Ponto</title>
    <link rel="icon" type="image/png" href="../assets/img/image_sem_fundo.png">
    <link rel="stylesheet" href="../assets/css/estilo.css">
</head>
<body>

<header>
    <img class="logo" src="../assets/img/image_sem_fundo.png" alt="Brasão de Santiago do Sul">
    <h1>Câmara Municipal de Santiago do Sul</h1>
</header>

<div class="titulo-sistema">Sistema de Ponto Eletrônico</div>

<section class="container card-registro">
    <span class="etiqueta">Histórico</span>
    <h3>Consultar Ponto</h3>

    <label>Nome:</label>
    <input type="text" id="nomeHistorico">

    <button class="botao" onclick="consultarHistorico()">Consultar</button>
    <p class="mensagem-ajuda" id="resumoHistorico"></p>

    <div class="tabela-area">
        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Hora</th>
                    <th>Registro</th>
                </tr>
            </thead>
            <tbody id="listaHistorico"></tbody>
        </table>
    </div>

    <a class="link-voltar" href="../index.html">Voltar</a>
</section>

<footer>
    &copy; 2026 Câmara Municipal de Santiago do Sul
</footer>

<script src="../assets/js/storage.js"></script>
<script src="../assets/js/script.js"></script>
</body>
</html>
